<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">Katalog Produk</title>
    <th:block th:replace="~{fragments/layout :: head-common}"></th:block>
</head>
<body class="bg-ink text-cream font-sans antialiased">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="max-w-7xl mx-auto px-6 py-12">

    <!-- PAGE HEADER -->
    <div class="border-b border-border pb-8 mb-10 animate-fade-up">
        <p class="font-mono text-xs text-gold font-bold tracking-[.2em] uppercase mb-2">// Katalog Lengkap</p>
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-3">
            <h1 class="font-serif font-black text-cream" style="font-size:clamp(2rem,5vw,3.5rem)"
                th:text="${title}">Daftar Produk</h1>
            <p class="font-mono text-sm text-muted">
                Menampilkan
                <strong class="text-gold" th:text="${totalProducts}">0</strong>
                produk
            </p>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="flex flex-col md:flex-row gap-4 mb-10 animate-fade-up-2">

        <!-- Search -->
        <form th:action="@{/products/search}" method="get"
              class="flex flex-1 max-w-sm">
            <input type="text" name="keyword"
                   th:value="${keyword}"
                   placeholder="Cari produk..."
                   class="flex-1 bg-panel border border-border border-r-0 text-cream font-mono text-sm px-4 py-2.5 placeholder:text-muted focus:outline-none focus:border-gold"/>
            <button type="submit"
                    class="bg-gold text-ink font-mono text-xs font-bold uppercase tracking-widest px-5 py-2.5 hover:bg-gold-light transition-colors">
                Cari
            </button>
        </form>

        <!-- Category filter badges -->
        <div class="flex items-center gap-2 flex-wrap">
            <span class="font-mono text-xs text-muted uppercase tracking-widest">Filter:</span>
            <a th:href="@{/products}"
               class="font-mono text-xs font-bold uppercase tracking-widest px-3 py-1 border border-border text-muted hover:border-gold hover:text-gold transition-colors">
                Semua
            </a>
            <a th:href="@{/products/category/Elektronik}"
               th:classappend="${selectedCategory == 'Elektronik'} ? ' border-gold text-gold' : ' border-border text-muted hover:border-gold hover:text-gold'"
               class="font-mono text-xs font-bold uppercase tracking-widest px-3 py-1 border transition-colors">
                ⚡ Elektronik
            </a>
            <a th:href="@{/products/category/Buku}"
               th:classappend="${selectedCategory == 'Buku'} ? ' border-gold text-gold' : ' border-border text-muted hover:border-gold hover:text-gold'"
               class="font-mono text-xs font-bold uppercase tracking-widest px-3 py-1 border transition-colors">
                📖 Buku
            </a>
            <a th:href="@{/products/category/Makanan}"
               th:classappend="${selectedCategory == 'Makanan'} ? ' border-gold text-gold' : ' border-border text-muted hover:border-gold hover:text-gold'"
               class="font-mono text-xs font-bold uppercase tracking-widest px-3 py-1 border transition-colors">
                ☕ Makanan
            </a>
        </div>
    </div>

    <!-- PRODUCT GRID -->
    <div th:if="${!products.isEmpty()}"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

        <a th:each="product, s : ${products}"
           th:href="@{/products/{id}(id=${product.id})}"
           class="card-hover block bg-panel border border-border overflow-hidden animate-fade-up">

            <!-- Category color bar -->
            <div th:if="${product.category == 'Elektronik'}" class="h-0.5 bg-gradient-to-r from-gold to-gold-dark"></div>
            <div th:if="${product.category == 'Buku'}"       class="h-0.5 bg-gradient-to-r from-blue-500 to-blue-700"></div>
            <div th:if="${product.category == 'Makanan'}"    class="h-0.5 bg-gradient-to-r from-green-500 to-green-700"></div>

            <div class="p-6">
                <!-- Top row -->
                <div class="flex items-start justify-between mb-5">
                    <span class="text-3xl" th:text="${product.category == 'Elektronik'} ? '⚡' : (${product.category == 'Buku'} ? '📖' : '☕')">⚡</span>
                    <span class="font-mono text-[10px] font-bold uppercase tracking-widest px-2 py-1 border border-border text-muted"
                          th:text="${product.category}">Kategori</span>
                </div>

                <!-- Name -->
                <h3 class="font-serif font-bold text-lg text-cream leading-snug mb-2"
                    th:text="${product.name}">Nama Produk</h3>

                <!-- Divider -->
                <div class="h-px bg-border my-4"></div>

                <!-- Price & Stock -->
                <div class="flex items-center justify-between">
          <span class="font-serif font-bold text-gold"
                th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</span>

                    <span th:if="${product.stock < 20}"
                          class="font-mono text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 bg-red-500/10 text-red-400 border border-red-500/25">
            ⚠ [[${product.stock}]] sisa
          </span>
                    <span th:if="${product.stock >= 20}"
                          class="font-mono text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 bg-green-500/10 text-green-400 border border-green-500/20">
            ✓ Tersedia
          </span>
                </div>
            </div>
        </a>

    </div>

    <!-- EMPTY STATE -->
    <div th:if="${products.isEmpty()}"
         class="border border-dashed border-border py-24 text-center">
        <p class="font-serif text-4xl text-border mb-3">Tidak Ada Produk</p>
        <p class="font-mono text-xs text-muted">// Coba kata kunci atau filter lain</p>
        <a th:href="@{/products}"
           class="inline-block mt-6 font-mono text-xs font-bold uppercase tracking-widest text-gold hover:text-gold-light transition-colors">
            ← Reset pencarian
        </a>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
